<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_data/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_data/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_data/favicon-16x16.png">
    <link rel="manifest" href="favicon_data/site.webmanifest">
    <link rel="preload" href="fonts/Inter/Inter-VariableFont_opsz,wght.ttf" as="font" type="font/ttf" crossorigin="anonymous">
  <title>I AM ELLIE</title>
  <link href="assets/styles/index.css" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <img class="site-logo" alt="I.M.L.E logo" src="assets/images/logo.svg" width="230" height="97" />
  </header>

  <main class="hero" aria-labelledby="page-title">
    <p class="hero-kicker">My repository of projects</p>
    <h1 id="page-title">Hi, I'm Ellie</h1>
    <p class="hero-summary">Designer, front-end engineer, accessibility-led builder.</p>

    <nav class="hero-actions" aria-label="Featured destinations">
      <ul class="action-list">
        <li>
          <a class="action-card" target="_blank" rel="noopener noreferrer" href="https://wedding.imle.uk">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 19V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12" />
                <path d="M7 16.5 10.5 13l2.5 2.5 3.5-4L20 15" />
                <path d="M8.5 9h.01" />
              </svg>
            </span>
            <span>
              <span class="action-title">Wedding Gallery</span>
              <span class="action-meta">Photos & moments</span>
            </span>
          </a>
        </li>

        <li>
          <a class="action-card" target="_blank" rel="noopener noreferrer" href="https://cv.imle.uk">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M7 3h7l4 4v14H7z" />
                <path d="M14 3v5h5" />
                <path d="M10 12h6M10 16h6" />
              </svg>
            </span>
            <span>
              <span class="action-title">CV</span>
              <span class="action-meta">Experience & skills</span>
            </span>
          </a>
        </li>

        <li>
          <a class="action-card" target="_blank" rel="noopener noreferrer" href="https://ux.imle.uk">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 5h16v12H4z" />
                <path d="M8 21h8" />
                <path d="M12 17v4" />
                <path d="m8 10 2 2 4-4 2 2" />
              </svg>
            </span>
            <span>
              <span class="action-title">UX Case Studies</span>
              <span class="action-meta">Research & outcomes</span>
            </span>
          </a>
        </li>

        <li>
          <a class="action-card action-card-chat" target="_blank" rel="noopener noreferrer" href="https://chat.imle.uk">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M5 6.5A3.5 3.5 0 0 1 8.5 3h7A3.5 3.5 0 0 1 19 6.5v5A3.5 3.5 0 0 1 15.5 15H11l-5 4v-4.5A3.5 3.5 0 0 1 5 11.5z" />
                <path d="M9 8h6M9 11h4" />
              </svg>
            </span>
            <span>
              <span class="action-title">Live chat to Ellie</span>
              <span class="action-meta">Open conversation</span>
            </span>
          </a>
        </li>
      </ul>
    </nav>
  </main>
</body>
</html>
