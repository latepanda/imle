<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_data/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_data/favicon-32x32.png">

  <link rel="preload" href="/assets/fonts/Inter/Inter-Regular.ttf" as="font" type="font/ttf" crossorigin="anonymous">

  <title>UX Case Studies Coming Soon</title>

<body>
  <header class="site-header">
    <a class="brand-link" href="http://www.imle.uk" aria-label="Return to the IMLE homepage">

  <main class="coming-soon-page" aria-labelledby="ux-title">
    <section class="coming-soon-panel" aria-live="polite">
      <p class="status-pill">
        <span class="status-dot" aria-hidden="true"></span>

      <div class="research-preview" aria-hidden="true">
        <div class="preview-card preview-card-large">
          <span></span>
          <span></span>
          <span></span>

        <div class="preview-grid">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="preview-timeline">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="coming-soon-copy">
        <p class="eyebrow">UX case studies &amp; research</p>
        <h1 id="ux-title">Case studies are being prepared</h1>
        <p>
          This space will soon share selected UX research, design decisions,
          accessibility thinking, and outcomes from Ellie's portfolio. The studies
          are not quite ready to go online yet, but they are on the way.
        </p>
      </div>

      <a class="home-link" href="http://www.imle.uk">Back to homepage</a>
    </section>
  </main>
